<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <!-- Safari-browser polish (Mike 2026-07-11: "looks funky on safari, not everyone will download it"):
       tint Safari's own top/bottom chrome to the app's stone so the page and the browser read as one
       surface. #F8F7F5 = oklch(0.985 0.003 75), the locked background token. -->
  <meta name="theme-color" content="#F8F7F5" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Perf (2026-07-11, Mike's phone-load report): open the CDN + Supabase sockets during HTML parse so the
       deferred scripts + first data fetch skip the connection handshake on a phone connection. -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://mlzblkzflgylnjorgjcp.supabase.co" crossorigin>
  <!-- The Home lead logo is the LCP image but was only discoverable after app.js rendered (852ms of the
       975ms lab LCP was discovery delay) — preload it so it's in flight from the first bytes. -->
  <link rel="preload" as="image" href="/logo-mark.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=Barlow+Semi+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="/favicon-32.png" />
  <link rel="stylesheet" href="/styles.css" />
  <title>Athletic Specimen</title>

  <style>
    /* Table + badges used by Tournament views */
    .table { width:100%; border-collapse:collapse; }
    .table thead th { text-align:left; font-weight:600; border-bottom:1px solid var(--border); padding:6px 8px; }
    .table tbody td { border-bottom:1px solid var(--border); padding:6px 8px; }
    .badge { display:inline-block; padding:2px 8px; border-radius:999px; background:var(--accent-soft); color:var(--accent); font-size:12px; }

    /* Boot splash (§38 2026-07-11, Mike's pick: A+B hybrid — breathing logo-mark over the wordmark +
       a sweeping hairline). Paints from pure HTML/CSS the instant the document arrives, replaced when
       render() swaps #root. SELF-CONTAINED (literal values, not var()) so it renders even if styles.css
       is still in flight; tokens mirror styles.css :root — stone/ink/muted/accent/border. */
    .boot-splash { position:fixed; inset:0; background:oklch(0.985 0.003 75);
      display:flex; align-items:center; justify-content:center; }
    .boot-splash .bs-inner { display:flex; flex-direction:column; align-items:center; gap:10px; }
    .boot-splash .bs-mark { width:104px; height:104px; object-fit:contain;
      animation:bs-breathe 2s ease-in-out infinite; }
    .boot-splash .bs-wm { font-family:'Barlow Semi Condensed','Inter',sans-serif; font-weight:800;
      font-size:21px; letter-spacing:.12em; color:oklch(0.18 0.005 75); margin-top:4px; }
    .boot-splash .bs-co { font-family:'Inter',sans-serif; font-weight:600; font-size:9px;
      letter-spacing:.42em; color:oklch(0.55 0.07 240); }
    .boot-splash .bs-ln { width:120px; height:1px; background:oklch(0.90 0.005 75); margin-top:12px;
      position:relative; overflow:hidden; }
    .boot-splash .bs-ln::after { content:''; position:absolute; inset:0; background:oklch(0.55 0.07 240);
      opacity:.55; transform:translateX(-100%); animation:bs-sweep 1.4s ease-in-out infinite; }
    @keyframes bs-breathe { 50% { opacity:.55; transform:scale(.97); } }
    @keyframes bs-sweep { 50% { transform:translateX(0); } 100% { transform:translateX(100%); } }
    @media (prefers-reduced-motion: reduce) {
      .boot-splash .bs-mark { animation:none; }
      .boot-splash .bs-ln::after { animation:none; opacity:.25; transform:none; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot-splash" aria-label="Athletic Specimen is loading">
      <div class="bs-inner">
        <img class="bs-mark" src="/logo-mark.png" alt="" />
        <div class="bs-wm">ATHLETIC&nbsp;SPECIMEN</div>
        <div class="bs-co">C O L O R A D O</div>
        <div class="bs-ln"></div>
      </div>
    </div>
  </div>

  <!-- Back to top -->
  <button type="button" id="back-to-top" aria-label="Back to top">↑</button>

  <!-- QR Code Modal -->
  <div id="qrModal" class="qr-modal" hidden>
    <div class="qr-modal-backdrop"></div>
    <div class="qr-modal-card">
      <button type="button" class="qr-modal-close" id="qrModalClose" aria-label="Close">×</button>
      <h2 class="qr-modal-title">Scan to Check In</h2>
      <p class="qr-modal-subtitle">Point your phone camera at the code below</p>
      <div id="qrCodeContainer" class="qr-code-container"></div>
      <div class="qr-modal-url" id="qrModalUrl">https://athletic-specimen-app.vercel.app/checkin.html</div>
      <div class="qr-modal-actions">
        <button type="button" class="btn btn-secondary" id="qrCopyBtn">Copy URL</button>
        <button type="button" class="btn btn-primary" id="qrCloseBottomBtn">Close</button>
      </div>
    </div>
  </div>

  <noscript>
    <div style="padding:2rem;text-align:center;font-family:sans-serif;color:#fff;">
      This app requires JavaScript to run.
    </div>
  </noscript>

  <!-- Small helpers -->
  <script>
    // Fail-safe loader — show message if a JS file fails to load
    window.addEventListener('error', function (e) {
      if (e.target.tagName === 'SCRIPT') {
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding:2rem;text-align:center;font-family:sans-serif;color:#fff;">Failed to load app files. Try refreshing the page.</div>';
        }
      }
    }, true);
  </script>

  <!-- Perf (2026-07-11): these three were SYNCHRONOUS — they blocked HTML parsing on two CDN round-trips
       before the (deferred) app could even be parsed. All scripts below are now `defer`: defer scripts
       execute in DOCUMENT ORDER after parse, so the dependency chain (supabase UMD -> config -> pure -> app)
       is preserved exactly. QRCode is only used by the on-demand QR modal. -->
  <!-- QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.5/dist/umd/supabase.min.js" defer></script>
  <!-- Shared Supabase config (URL + anon key) — must load before app.js -->
  <script src="/supabase-config.js" defer></script>
  <!-- Pure logic (tournament/balancing/scoring) — shared with the vitest suite; MUST load before app.js -->
  <script src="/pure.js" defer></script>
  <!-- Main App (tournament UI: buildTournamentTabHTML + bindTournamentTabV2) -->
  <script src="/app.js" defer></script>
</body>
</html>
