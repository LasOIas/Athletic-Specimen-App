<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f5f1" />
  <title>Athletic Specimen · Check In</title>
  <link rel="icon" type="image/png" href="/favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=Barlow+Semi+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    /* C36 T6: direction-A light kiosk — mirrors the in-app Check In (T1) for consistency. */
    :root {
      --bg: oklch(0.985 0.003 75);
      --surface: oklch(0.97 0.003 75);
      --surface-2: oklch(0.95 0.004 75);
      --border: oklch(0.90 0.005 75);
      --text: oklch(0.18 0.005 75);
      --text-dim: oklch(0.50 0.005 75);
      --accent: oklch(0.55 0.07 240);      /* muted blue — the app accent */
      --accent-dim: oklch(0.96 0.015 240); /* accent-soft */
      --live: oklch(0.55 0.09 150);        /* muted green — success/checked-in */
      --live-soft: oklch(0.96 0.03 150);
      --live-ink: oklch(0.40 0.09 150);    /* live text on live-soft — checked-in hero state (app --live-ink) */
      --accent-bd: oklch(0.86 0.03 240);   /* accent border — mirrors the in-app hero card (app --accent-bd) */
      --danger: oklch(0.55 0.16 25);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 17px;
      min-height: 100vh;
      overscroll-behavior-y: none;
    }
    body {
      padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) calc(40px + env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      max-width: 520px;
      margin: 0 auto;
    }
    .header { margin-bottom: 24px; padding-top: 8px; text-align: center; }
    .cik-logo { height: 130px; width: auto; display: block; margin: 0 auto 14px; }
    .eyebrow {
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 6px;
    }
    h1 { font-family: 'Sora', 'Inter', sans-serif; font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
    .subtitle { color: var(--text-dim); margin-top: 6px; font-size: 15px; }
    input[type="text"] {
      width: 100%;
      padding: 17px 18px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 18px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); background: var(--bg); }
    input::placeholder { color: var(--text-dim); }
    #suggestions { list-style: none; padding: 0; margin: 12px 0 0 0; }
    #suggestions li {
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 13px;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, transform 0.05s;
      user-select: none;
    }
    #suggestions li:active {
      background: var(--accent-dim);
      border-color: var(--accent);
      transform: scale(0.98);
    }
    .no-match {
      margin-top: 16px;
      padding: 20px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 12px;
      text-align: center;
    }
    .no-match p { margin: 0 0 12px 0; color: var(--text-dim); font-size: 15px; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: none;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.05s, background 0.15s, opacity 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:active { transform: scale(0.98); background: oklch(0.48 0.08 240); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:active { transform: scale(0.98); background: var(--surface); }
    /* C62: the register form now lives in a center-modal popup (reuses the locked .dialog-* pattern below). */
    .dialog-card input[type="text"] { text-align: left; margin-bottom: 10px; }
    .dialog-card .error { text-align: left; margin: 4px 0 10px; }
    .success { text-align: center; padding: 60px 20px; }
    .success-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: var(--live-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--live);
    }
    .success-icon svg { width: 48px; height: 48px; stroke: var(--live); }
    .success h2 { font-family: 'Sora', 'Inter', sans-serif; font-size: 24px; margin: 0 0 8px 0; font-weight: 800; }
    .success .name {
      font-family: 'Sora', 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--live);
      margin: 8px 0 32px;
      word-break: break-word;
    }
    .success .btn { max-width: 280px; margin: 0 auto; }
    .error {
      margin-top: 12px;
      padding: 12px 16px;
      background: oklch(0.95 0.03 25);
      border: 1px solid oklch(0.88 0.05 25);
      border-radius: 10px;
      color: var(--danger);
      font-size: 14px;
    }
    .loading { text-align: center; padding: 40px 20px; color: var(--text-dim); }
    [hidden] { display: none !important; }
    /* C47: confirm-on-tap dialog (Option A center modal) — replaces native confirm()/alert() */
    .dialog-overlay { position: fixed; inset: 0; background: oklch(0.18 0.005 75 / 0.42); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 50; }
    .dialog-card { width: 100%; max-width: 360px; background: var(--bg); border: 1px solid var(--border); border-radius: 18px; padding: 26px 22px 22px; box-shadow: 0 18px 50px oklch(0.18 0.01 75 / 0.28); text-align: center; }
    .dialog-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--accent-dim); color: var(--accent); font-family: 'Sora', sans-serif; font-weight: 800; font-size: 22px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .dialog-name { font-family: 'Sora', 'Inter', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -0.01em; word-break: break-word; }
    .dialog-q { color: var(--text-dim); font-size: 15px; margin: 6px 0 22px; }
    .dialog-card .btn + .btn { margin-top: 10px; }
    /* Round 2 (spec §12.3) — one-tap check-in hero. Mirrors the in-app .ckh-* system (styles.css,
       Slice C) adapted to this page's tokens: app --accent-soft == --accent-dim, --ink == --text,
       --muted == --text-dim, --r-lg==16px, --r-md==13px, --shadow inlined. Best-effort / additive:
       hidden entirely unless a carried app session resolves an unambiguous claimed player. */
    .ckh-card {
      background: oklch(0.98 0.004 75 / 0.30);
      -webkit-backdrop-filter: blur(3px) saturate(1.05);
      backdrop-filter: blur(3px) saturate(1.05);
      border: 1.5px solid var(--accent-bd);
      border-radius: 16px;
      box-shadow: 0 1px 2px oklch(0.18 0.005 75 / .06), 0 4px 14px oklch(0.18 0.005 75 / .05);
      padding: 24px 18px 18px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      margin: 4px auto 14px;
    }
    .ckh-av {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent-dim); border: 1px solid var(--accent-bd); color: var(--accent);
      font-family: 'Sora', 'Inter', sans-serif; font-weight: 800; font-size: 21px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .ckh-eyebrow {
      display: block; font-size: 11px; font-weight: 700; letter-spacing: .7px;
      text-transform: uppercase; color: var(--text-dim); margin-top: 12px;
    }
    .ckh-name {
      font-family: 'Sora', 'Inter', sans-serif; font-weight: 800; font-size: 23px;
      color: var(--text); margin-top: 2px; word-break: break-word;
    }
    .ckh-btn {
      width: 100%; margin-top: 16px; min-height: 52px; border: none; border-radius: 13px;
      background: var(--accent); color: #fff; font-weight: 700; font-size: 17px;
      font-family: inherit; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      transition: transform 0.05s, background 0.15s;
    }
    .ckh-btn:active { transform: scale(0.98); background: oklch(0.48 0.08 240); }
    .ckh-btn svg { width: 20px; height: 20px; }
    .ckh-btn.is-in {
      background: var(--live-soft); color: var(--live-ink);
      border: 1px solid oklch(0.85 0.05 150); cursor: default;
    }
    .ckh-btn.is-in:active { transform: none; background: var(--live-soft); }
    .ckh-alts { text-align: center; margin: 0 0 18px; }
    .ckh-alt-label { font-size: 13px; font-weight: 600; color: var(--text-dim); }
    /* Slice 5 (§13.8): widen the standalone kiosk card modestly on desktop; mobile unchanged. */
    @media (min-width: 1024px) {
      body { max-width: 640px; }
      .cik-logo { height: 150px; }
    }
  </style>
</head>
<body>
  <div id="session-banner" hidden style="
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 24px;
  ">
    <div style="font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-bottom:8px;">Next Session</div>
    <div id="session-date-el"  style="display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); font-size:16px;"><span style="display:flex; flex-shrink:0; color:var(--accent);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg></span><span></span></div>
    <div id="session-time-el"  style="display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); font-size:16px;"><span style="display:flex; flex-shrink:0; color:var(--accent);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></svg></span><span></span></div>
    <div id="session-loc-el"   style="display:flex; align-items:center; gap:8px; padding:6px 0; font-size:16px;"><span style="display:flex; flex-shrink:0; color:var(--accent);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s7-5.5 7-11a7 7 0 10-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.6"/></svg></span><span></span></div>
  </div>
  <div id="app">
    <div id="main">
      <div class="header">
        <img class="cik-logo" src="/logo-mark.png" alt="Athletic Specimen" />
        <h1>Check in</h1>
        <div class="subtitle">Tap your name below</div>
      </div>
      <input
        id="nameInput"
        type="text"
        placeholder="Start typing your name…"
        autocomplete="off"
        autocapitalize="words"
        spellcheck="false"
      />
      <ul id="suggestions"></ul>
      <div id="checkinError" class="error" hidden></div>
      <div id="noMatch" class="no-match" hidden>
        <p>Don't see your name?</p>
        <button id="newPlayerBtn" class="btn btn-secondary">I'm new — register me</button>
      </div>
      <div id="loadingState" class="loading">Loading roster…</div>
      <div id="loadError" class="error" hidden>
        Couldn't load the roster. Check your connection and refresh.
      </div>
    </div>
    <div id="successScreen" class="success" hidden>
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h2>You're checked in</h2>
      <div class="name" id="successName"></div>
      <button id="anotherBtn" class="btn btn-secondary">Check in someone else</button>
    </div>
  </div>
  <div id="confirmDialog" class="dialog-overlay" hidden>
    <div class="dialog-card" role="dialog" aria-modal="true" aria-labelledby="dialogName">
      <div class="dialog-avatar" id="dialogAvatar"></div>
      <div class="dialog-name" id="dialogName"></div>
      <div class="dialog-q" id="dialogQ">Check this person in?</div>
      <button class="btn btn-primary" id="dialogConfirm">Check in</button>
      <button class="btn btn-secondary" id="dialogCancel">Cancel</button>
    </div>
  </div>
  <!-- C62: "I'm new" opens this register popup (reuses the locked .dialog-* pattern) so the next step is unmissable. -->
  <div id="registerDialog" class="dialog-overlay" hidden>
    <div class="dialog-card" role="dialog" aria-modal="true" aria-labelledby="registerTitle">
      <div class="dialog-avatar" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
      </div>
      <div class="dialog-name" id="registerTitle">Welcome! Let's add you</div>
      <div class="dialog-q">Enter your first and last name</div>
      <input id="firstName" type="text" placeholder="First name" autocapitalize="words" spellcheck="false" />
      <input id="lastName" type="text" placeholder="Last name" autocapitalize="words" spellcheck="false" />
      <div id="registerError" class="error" hidden></div>
      <button class="btn btn-primary" id="submitRegister">Register &amp; check in</button>
      <button class="btn btn-secondary" id="registerCancel">Cancel</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Shared Supabase config (URL + anon key) — must load before this script (C25 item 7) -->
  <script src="/supabase-config.js"></script>
  <!-- Slice 4 (§13.6): reuse the app's pure helpers (sessionIsUpcoming — past-dated session guard) so this
       page never drifts from the app. Browser-safe: pure.js's module.exports guard is skipped when `module`
       is undefined, and every helper is exposed as a global. -->
  <script src="/pure.js"></script>
  <script>
    // SUPABASE_URL + SUPABASE_ANON_KEY come from public/supabase-config.js (loaded above).
    const GROUP_NAME = CLUB_GROUP; // Wave 1d: shared canonical club group (supabase-config.js)

    // C21: kiosk is anon-only (no admin login); persistSession=false keeps it stateless so no
    // auth token can ever linger on this shared public device.
    // storageKey namespaces this anon client OFF the default auth-token key so it never collides with
    // the read-only sbUser client below (Round 2) — persistSession:false keeps it in-memory/stateless
    // (C21) and the anon flow never touches auth storage, so this is behavior-neutral + more isolated.
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false, storageKey: 'as-kiosk-anon' } });
    const $ = (id) => document.getElementById(id);
    let roster = [];

    // Round 2 (spec §12.3): if the visitor is signed into the app on THIS device/browser, their
    // persisted session lives in localStorage (same origin) — read it to offer a one-tap hero.
    // READ-ONLY auth client: autoRefreshToken:false so this stateless kiosk (C21) never writes or
    // rotates tokens — it only READS a session the app itself already persisted. We never call
    // sign-in/out on it, so no auth token can ever linger from this page. Any failure -> the anon
    // kiosk below is byte-identical to today (the hero is best-effort and purely additive).
    const sbUser = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, autoRefreshToken: false } });

    async function tryRenderHero() {
      try {
        const { data: sess } = await sbUser.auth.getSession();
        const user = sess && sess.session && sess.session.user;
        if (!user) return;                                   // no carried session -> search-first kiosk
        // Mirror checkinHeroModel's exactly-one rule (this page has no module system): 0 rows
        // (unclaimed) or 2+ rows (ambiguous) -> no hero. checked_in drives the muted state.
        const { data, error } = await sbUser.from('players')
          .select('id,name,checked_in').eq('claimed_by_profile', user.id).limit(2);
        if (error || !Array.isArray(data) || data.length !== 1 || !data[0].id || !data[0].name) return;
        renderCheckinHero(data[0]);
      } catch (_) { /* best-effort — the anon kiosk is untouched */ }
    }

    // Inject the hero card ABOVE the search input. Reuses the page's existing check-in path
    // (checkInExisting -> check_in RPC -> showSuccess) so the success screen + vibration are shared.
    function renderCheckinHero(player) {
      if (!player || !player.id || !player.name) return;
      const input = $('nameInput');
      if (!input || !input.parentNode) return;
      const existing = $('checkinHero');                     // repaint in place if already shown (tap flip)
      const isIn = player.checked_in === true;
      const wrap = document.createElement('div');
      wrap.id = 'checkinHero';
      wrap.innerHTML = `
        <div class="ckh-card">
          <span class="ckh-av"></span>
          <span class="ckh-eyebrow">Signed in</span>
          <div class="ckh-name"></div>
          <button type="button" class="ckh-btn${isIn ? ' is-in' : ''}" id="heroCheckinBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12.5l2.5 2.5L15.5 9"/><circle cx="12" cy="12" r="9"/></svg>
            <span class="ckh-btn-label"></span>
          </button>
        </div>
        <div class="ckh-alts"><span class="ckh-alt-label">Checking in someone else? Use the search below.</span></div>`;
      // textContent (not interpolation) — reuse the page's nameInitials(); no HTML injection from names.
      wrap.querySelector('.ckh-av').textContent = nameInitials(player.name);
      wrap.querySelector('.ckh-name').textContent = player.name;
      wrap.querySelector('.ckh-btn-label').textContent = isIn ? "You're checked in" : 'Check in';
      if (existing) existing.replaceWith(wrap); else input.parentNode.insertBefore(wrap, input);
      if (isIn) return;                                      // muted 'You're checked in' -> no action (mirrors the app hero)
      wrap.querySelector('#heroCheckinBtn').addEventListener('click', () => {
        // No confirm dialog: this is the visitor's OWN signed-in card (the confirm popup exists for
        // mis-taps on OTHER people's names). Same check-in fn a tapped suggestion uses -> shared
        // success screen + vibration. Optimistically flip to the muted state; the shared success
        // screen shows over it, and on error we revert (the inline #checkinError explains why).
        checkInExisting(player, () => { player.checked_in = false; renderCheckinHero(player); });
        player.checked_in = true;
        renderCheckinHero(player);
      });
    }

    // C47: styled confirm dialog (Option A center modal) — replaces native confirm()/alert().
    let pendingConfirm = null;
    function nameInitials(name) {
      const w = String(name || '').trim().split(/\s+/).filter(Boolean);
      return (((w[0] || '')[0] || '') + ((w[w.length - 1] || '')[0] || '')).toUpperCase();
    }
    function openConfirm(name, onConfirm, question) {
      $('dialogName').textContent = name;
      $('dialogAvatar').textContent = nameInitials(name);
      $('dialogQ').textContent = question || 'Check this person in?';
      pendingConfirm = onConfirm;
      $('confirmDialog').hidden = false;
    }
    function closeConfirm() { $('confirmDialog').hidden = true; pendingConfirm = null; }
    $('dialogConfirm').addEventListener('click', () => { const fn = pendingConfirm; closeConfirm(); if (fn) fn(); });
    $('dialogCancel').addEventListener('click', closeConfirm);
    $('confirmDialog').addEventListener('click', (e) => { if (e.target === $('confirmDialog')) closeConfirm(); });

    async function loadSessionBanner() {
      try {
        const { data, error } = await sb
          .from('sessions')
          .select('date, time, location')
          .eq('id', 1)
          .maybeSingle();
        if (error || !data) return;
        const banner = document.getElementById('session-banner');
        if (!banner) return;
        // §13.6: never show a stale past-dated session. If the date is in the past (or missing/unparseable),
        // render the quiet "No session scheduled" state instead of a fabricated future-looking banner.
        // Falls back to showing the date if pure.js didn't load (behavior-neutral vs before).
        if (typeof sessionIsUpcoming === 'function' && !sessionIsUpcoming(data.date)) {
          banner.innerHTML =
            '<div style="font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-bottom:8px;">Next Session</div>'
            + '<div style="font-size:15px; color:var(--text-dim);">No session scheduled yet — check back soon.</div>';
          banner.hidden = false;
          return;
        }
        const [y, m, d] = data.date.split('-').map(Number);
        const dateStr = new Date(y, m - 1, d).toLocaleDateString('en-US', {
          weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
        });
        document.querySelector('#session-date-el span:last-child').textContent = dateStr;
        document.querySelector('#session-time-el span:last-child').textContent = data.time || '';
        document.querySelector('#session-loc-el  span:last-child').textContent = data.location || '';
        banner.hidden = false;
      } catch (err) {
        console.warn('session banner error', err);
      }
    }

    let loadRosterInFlight = false;
    let rosterLoaded = false;       // C46 (rank 3): true only after a successful roster load
    let rosterInitFocused = false;  // C46 (rank 27): autofocus the name input once, when ready
    async function loadRoster() {
      if (loadRosterInFlight) return; // C24 item 7: guard concurrent focus/visibility/interval fetches
      loadRosterInFlight = true;
      try {
        // NF-9: load the FULL roster, not just group=CLUB_GROUP. Filtering by group meant anyone stored
        // under a different/empty/legacy group (or via the `tag` schema) was invisible to this door, so the
        // existing-player check missed them and they re-registered as a duplicate — the two doors disagreed
        // on "who exists". New registrants are still tagged into CLUB_GROUP below (p_group: GROUP_NAME).
        const { data, error } = await sb
          .from('players')
          .select('id, name')
          .order('name', { ascending: true });
        if (error) throw error;
        roster = (data || []).filter((p) => p.name && !p.name.startsWith('__'));
        rosterLoaded = true;
        $('loadingState').hidden = true;
        // C46 (rank 3): re-run suggestions with the current input once the roster is in, so a name typed
        // DURING the load now matches (instead of falling through to a duplicate self-registration).
        renderSuggestions($('nameInput').value);
        if (!rosterInitFocused) { rosterInitFocused = true; $('nameInput').focus(); } // rank 27: autofocus once ready
      } catch (err) {
        console.error('Load error:', err);
        $('loadingState').hidden = true;
        $('loadError').hidden = false;
      } finally {
        loadRosterInFlight = false;
      }
    }

    function renderSuggestions(query) {
      const ul = $('suggestions');
      const noMatch = $('noMatch');
      ul.innerHTML = '';
      const q = query.toLowerCase();
      const matches = (() => {
        if (!query) return [];
        const firstNameMatches = [];
        const lastNameMatches = [];
        for (const p of roster) {
          const words = p.name.toLowerCase().split(' ');
          if (words[0].startsWith(q)) firstNameMatches.push(p);
          else if (words.slice(1).some((w) => w.startsWith(q))) lastNameMatches.push(p);
        }
        const sort = (arr) => arr.sort((a, b) => {
          const af = a.name.split(' ')[0].toLowerCase();
          const bf = b.name.split(' ')[0].toLowerCase();
          return af < bf ? -1 : af > bf ? 1 : 0;
        });
        return [...sort(firstNameMatches), ...sort(lastNameMatches)].slice(0, 8);
      })();
      matches.forEach((p) => {
        const li = document.createElement('li');
        li.textContent = p.name;
        li.addEventListener('click', () => {
          if (li.dataset.busy) return;
          // C47: confirm before checking in, so a mis-tap doesn't check in the wrong person.
          openConfirm(p.name, () => {
            li.dataset.busy = '1';
            li.style.opacity = '0.55';
            li.textContent = 'Checking in ' + p.name + '…';
            ul.style.pointerEvents = 'none';
            checkInExisting(p, () => {
              li.dataset.busy = '';
              li.style.opacity = '';
              li.textContent = p.name;
              ul.style.pointerEvents = '';
            });
          });
        });
        ul.appendChild(li);
      });
      // C25 item 6: show the "I'm new — register me" prompt ONLY when the user has typed
      // a non-empty query that matched nobody. On an empty query (incl. initial load) the
      // prompt stays hidden (matches=[] would otherwise un-hide it).
      // C46 (rank 3): only offer "I'm new — register" once the roster has actually loaded — otherwise a
      // name typed during the initial load (or on a load failure) wrongly looks like "no match" and the
      // player self-registers a duplicate of someone already on the list.
      noMatch.hidden = matches.length > 0 || !query.trim() || !rosterLoaded;
    }

    async function checkInExisting(player, onError) {
      const errEl = $('checkinError');
      if (errEl) errEl.hidden = true;
      try {
        // C21: route through the SECURITY DEFINER RPC (the only anon write door under locked RLS).
        const { error } = await sb.rpc('check_in', { p_id: player.id });
        if (error) throw error;
        showSuccess(player.name);
      } catch (err) {
        console.error('Check-in error:', err);
        if (typeof onError === 'function') onError();
        // C47: no native alert() — the inline #checkinError is always present in the DOM.
        if (errEl) {
          errEl.textContent = 'Something went wrong checking you in. Try again, or tell the organizer.';
          errEl.hidden = false;
        }
      }
    }

    async function registerNewPlayer(firstName, lastName) {
      const fullName = `${firstName} ${lastName}`.trim();
      const existing = roster.find((p) => p.name.toLowerCase() === fullName.toLowerCase());
      if (existing) {
        // C47: styled confirm instead of native confirm() — "already on the list, is that you?"
        closeRegister(); // C62: close the register popup so the confirm dialog isn't stacked under it
        openConfirm(existing.name, () => { checkInExisting(existing); }, 'Already on the list — check them in?');
        return;
      }
      const errEl = $('registerError');
      errEl.hidden = true;

      // C21: register through the SECURITY DEFINER RPC (the only anon write door under locked
      // RLS). p_checked_in=true -> the kiosk registers AND checks the player in ("Register &
      // check in"). Idempotent server-side.
      const { error } = await sb.rpc('register_player', { p_name: fullName, p_group: GROUP_NAME, p_checked_in: true });
      if (!error) { showSuccess(fullName); return; }
      console.error('Register error:', error);
      errEl.textContent = `Could not register you: ${error?.message || 'unknown error'}`;
      errEl.hidden = false;
    }

    let successResetTimer = null;
    function showSuccess(name) {
      $('registerDialog').hidden = true; // C62: close the register popup before showing the success screen
      $('main').hidden = true;
      $('successName').textContent = name;
      $('successScreen').hidden = false;
      if (navigator.vibrate) navigator.vibrate(40);
      // C46 (rank 27): auto-return to the entry screen after a few seconds so the next person can just
      // start typing ("Check in someone else" still works immediately).
      clearTimeout(successResetTimer);
      successResetTimer = setTimeout(resetForAnother, 6000);
    }

    function resetForAnother() {
      clearTimeout(successResetTimer);
      $('successScreen').hidden = true;
      $('main').hidden = false;
      $('nameInput').value = '';
      $('firstName').value = '';
      $('lastName').value = '';
      $('suggestions').innerHTML = '';
      $('noMatch').hidden = true; // C25 item 6: input is cleared on reset → empty query → keep the register prompt hidden
      $('registerDialog').hidden = true;
      $('registerError').hidden = true;
      $('nameInput').focus();
    }

    $('nameInput').addEventListener('input', (e) => renderSuggestions(e.target.value));
    // C62: "I'm new" opens a center-modal register popup (reuses the .dialog-* pattern) instead of an
    // inline form, so the next action is unmissable.
    function openRegister() {
      $('noMatch').hidden = true;
      $('registerError').hidden = true;
      const typed = $('nameInput').value.trim();
      if (typed && !typed.includes(' ')) $('firstName').value = typed; // prefill a single typed word as the first name
      $('registerDialog').hidden = false;
      if ($('firstName').value) $('lastName').focus(); else $('firstName').focus();
    }
    function closeRegister() { $('registerDialog').hidden = true; }
    $('newPlayerBtn').addEventListener('click', openRegister);
    $('registerCancel').addEventListener('click', closeRegister);
    $('registerDialog').addEventListener('click', (e) => { if (e.target === $('registerDialog')) closeRegister(); });
    $('submitRegister').addEventListener('click', async () => {
      const first = $('firstName').value.trim();
      const last = $('lastName').value.trim();
      const errEl = $('registerError');
      errEl.hidden = true;
      // C47: require a real first AND last name (each >= 2 chars) — single-letter names cause "who is who" mix-ups.
      if (first.length < 2 || last.length < 2) {
        errEl.textContent = 'Please enter your full first and last name.';
        errEl.hidden = false;
        return;
      }
      const btn = $('submitRegister');
      btn.disabled = true;
      btn.textContent = 'Checking you in…';
      await registerNewPlayer(first, last);
      btn.disabled = false;
      btn.textContent = 'Register & check in';
    });
    $('anotherBtn').addEventListener('click', resetForAnother);

    loadRoster();
    loadSessionBanner();
    tryRenderHero(); // Round 2 (spec §12.3): best-effort one-tap hero if a signed-in app session is carried here
    // C24 item 7: re-fetch the roster mid-session so a player added on another device shows up in the
    // typeahead (instead of re-registering as a duplicate). Refresh periodically + when the kiosk regains focus.
    setInterval(loadRoster, 30000);
    window.addEventListener('focus', loadRoster);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) loadRoster(); });
  </script>
</body>
</html>
