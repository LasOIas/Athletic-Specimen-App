<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b0d10" />
  <title>Athletic Specimen · Check In</title>
  <style>
    :root {
      --bg: #0b0d10;
      --surface: #14181d;
      --surface-2: #1c2129;
      --border: #262d38;
      --text: #f2f4f7;
      --text-dim: #8b95a3;
      --accent: #4ade80;
      --accent-dim: #14532d;
      --danger: #f87171;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 17px;
      min-height: 100vh;
      overscroll-behavior-y: none;
    }
    body {
      padding: 24px 20px 40px;
      max-width: 520px;
      margin: 0 auto;
    }
    .header { margin-bottom: 28px; padding-top: 8px; }
    .eyebrow {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    h1 { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
    .subtitle { color: var(--text-dim); margin-top: 6px; font-size: 15px; }
    input[type="text"] {
      width: 100%;
      padding: 18px 18px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 18px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); background: var(--surface-2); }
    input::placeholder { color: var(--text-dim); }
    #suggestions { list-style: none; padding: 0; margin: 12px 0 0 0; }
    #suggestions li {
      padding: 18px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, transform 0.05s;
      user-select: none;
    }
    #suggestions li:active {
      background: var(--accent-dim);
      border-color: var(--accent);
      transform: scale(0.98);
    }
    .no-match {
      margin-top: 16px;
      padding: 20px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 12px;
      text-align: center;
    }
    .no-match p { margin: 0 0 12px 0; color: var(--text-dim); font-size: 15px; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: none;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.05s, background 0.15s, opacity 0.15s;
    }
    .btn-primary { background: var(--accent); color: #052e16; }
    .btn-primary:active { transform: scale(0.98); background: #22c55e; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:active { transform: scale(0.98); background: var(--surface); }
    .register-form {
      margin-top: 16px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .register-form h3 { margin: 0 0 4px 0; font-size: 17px; font-weight: 600; }
    .register-form .hint { color: var(--text-dim); font-size: 14px; margin-bottom: 16px; }
    .register-form input { margin-bottom: 10px; }
    .register-form .btn { margin-top: 8px; }
    .success { text-align: center; padding: 60px 20px; }
    .success-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--accent);
    }
    .success-icon svg { width: 48px; height: 48px; stroke: var(--accent); }
    .success h2 { font-size: 24px; margin: 0 0 8px 0; font-weight: 700; }
    .success .name {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      margin: 8px 0 32px;
      word-break: break-word;
    }
    .success .btn { max-width: 280px; margin: 0 auto; }
    .error {
      margin-top: 12px;
      padding: 12px 16px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 10px;
      color: var(--danger);
      font-size: 14px;
    }
    .loading { text-align: center; padding: 40px 20px; color: var(--text-dim); }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <div id="main">
      <div class="header">
        <div class="eyebrow">Athletic Specimen</div>
        <h1>Check in</h1>
        <div class="subtitle">Tap your name below</div>
      </div>
      <input
        id="nameInput"
        type="text"
        placeholder="Start typing your name…"
        autocomplete="off"
        autocapitalize="words"
        spellcheck="false"
      />
      <ul id="suggestions"></ul>
      <div id="noMatch" class="no-match" hidden>
        <p>Don't see your name?</p>
        <button id="newPlayerBtn" class="btn btn-secondary">I'm new — register me</button>
      </div>
      <div id="registerForm" class="register-form" hidden>
        <h3>Welcome! Let's get you added</h3>
        <div class="hint">Please enter both your first and last name</div>
        <input id="firstName" type="text" placeholder="First name" autocapitalize="words" spellcheck="false" />
        <input id="lastName" type="text" placeholder="Last name" autocapitalize="words" spellcheck="false" />
        <button id="submitRegister" class="btn btn-primary">Register & check in</button>
        <div id="registerError" class="error" hidden></div>
      </div>
      <div id="loadingState" class="loading">Loading roster…</div>
      <div id="loadError" class="error" hidden>
        Couldn't load the roster. Check your connection and refresh.
      </div>
    </div>
    <div id="successScreen" class="success" hidden>
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h2>You're checked in</h2>
      <div class="name" id="successName"></div>
      <button id="anotherBtn" class="btn btn-secondary">Check in someone else</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // CONFIG — paste from public/app.js
    const SUPABASE_URL = 'https://mlzblkzflgylnjorgjcp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1semJsa3pmbGd5bG5qb3JnamNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM5MDY1NzEsImV4cCI6MjA2OTQ4MjU3MX0.tqK5lCOKWy1wEaDwNGF6fTo08QxRdhp50LREHMpIVXs';
    const GROUP_NAME = 'Athletic Specimen';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const $ = (id) => document.getElementById(id);
    let roster = [];

    async function loadRoster() {
      try {
        const { data, error } = await sb
          .from('players')
          .select('id, name')
          .eq('group', GROUP_NAME)
          .order('name', { ascending: true });
        if (error) throw error;
        roster = (data || []).filter((p) => p.name && !p.name.startsWith('__'));
        $('loadingState').hidden = true;
      } catch (err) {
        console.error('Load error:', err);
        $('loadingState').hidden = true;
        $('loadError').hidden = false;
      }
    }

    function renderSuggestions(query) {
      const ul = $('suggestions');
      const noMatch = $('noMatch');
      ul.innerHTML = '';
      if (!query) { noMatch.hidden = true; return; }
      const q = query.toLowerCase();
      const matches = roster
        .filter((p) => p.name.toLowerCase().includes(q))
        .slice(0, 8);
      matches.forEach((p) => {
        const li = document.createElement('li');
        li.textContent = p.name;
        li.addEventListener('click', () => checkInExisting(p));
        ul.appendChild(li);
      });
      noMatch.hidden = !(query.trim().length >= 2 && matches.length === 0);
    }

    async function checkInExisting(player) {
      try {
        const { error } = await sb
          .from('players')
          .update({ checked_in: true })
          .eq('id', player.id);
        if (error) throw error;
        showSuccess(player.name);
      } catch (err) {
        console.error('Check-in error:', err);
        alert('Something went wrong checking you in. Please try again or tell the organizer.');
      }
    }

    async function registerNewPlayer(firstName, lastName) {
      const fullName = `${firstName} ${lastName}`.trim();
      const existing = roster.find((p) => p.name.toLowerCase() === fullName.toLowerCase());
      if (existing) {
        const confirmed = confirm(
          `"${existing.name}" is already in the list. Is that you?\n\nTap OK to check in as "${existing.name}".`
        );
        if (confirmed) await checkInExisting(existing);
        return;
      }
      try {
        const { data, error } = await sb
          .from('players')
          .insert([{ name: fullName, group: GROUP_NAME, checked_in: true, skill: null }])
          .select();
        if (error) {
          if (/null value in column "skill"|violates not-null/i.test(error.message)) {
            const retry = await sb
              .from('players')
              .insert([{ name: fullName, group: GROUP_NAME, checked_in: true, skill: 0 }])
              .select();
            if (retry.error) throw retry.error;
            showSuccess(fullName);
            return;
          }
          throw error;
        }
        showSuccess(fullName);
      } catch (err) {
        console.error('Register error:', err);
        const errEl = $('registerError');
        errEl.textContent = 'Could not register you. Please ask the organizer to add you.';
        errEl.hidden = false;
      }
    }

    function showSuccess(name) {
      $('main').hidden = true;
      $('successName').textContent = name;
      $('successScreen').hidden = false;
      if (navigator.vibrate) navigator.vibrate(40);
    }

    function resetForAnother() {
      $('successScreen').hidden = true;
      $('main').hidden = false;
      $('nameInput').value = '';
      $('firstName').value = '';
      $('lastName').value = '';
      $('suggestions').innerHTML = '';
      $('noMatch').hidden = true;
      $('registerForm').hidden = true;
      $('registerError').hidden = true;
      $('nameInput').focus();
    }

    $('nameInput').addEventListener('input', (e) => renderSuggestions(e.target.value));
    $('newPlayerBtn').addEventListener('click', () => {
      $('registerForm').hidden = false;
      $('noMatch').hidden = true;
      const typed = $('nameInput').value.trim();
      if (typed && !typed.includes(' ')) {
        $('firstName').value = typed;
        $('lastName').focus();
      } else {
        $('firstName').focus();
      }
    });
    $('submitRegister').addEventListener('click', async () => {
      const first = $('firstName').value.trim();
      const last = $('lastName').value.trim();
      const errEl = $('registerError');
      errEl.hidden = true;
      if (!first || !last) {
        errEl.textContent = 'Please enter both your first and last name.';
        errEl.hidden = false;
        return;
      }
      const btn = $('submitRegister');
      btn.disabled = true;
      btn.textContent = 'Checking you in…';
      await registerNewPlayer(first, last);
      btn.disabled = false;
      btn.textContent = 'Register & check in';
    });
    $('anotherBtn').addEventListener('click', resetForAnother);

    loadRoster();
  </script>
</body>
</html>
